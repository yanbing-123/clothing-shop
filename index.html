<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLOTHING STORE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container header-inner">
      <h1 class="logo">CLOTHING <span>STORE</span></h1>
      <div class="header-actions">
        <div class="user-section" id="userSection">
          <button class="btn-login" id="btnLogin" onclick="window._cloth.showLoginModal()">登录</button>
          <button class="btn-register" id="btnRegister" onclick="window._cloth.showRegisterModal()">注册</button>
        </div>
        <div class="user-info" id="userInfo" style="display:none;">
          <span class="user-name" id="userName"></span>
          <button class="btn-logout" onclick="window._cloth.logout()">退出</button>
        </div>
        <button class="cart-btn" onclick="window._cloth.toggleDrawer()">
          🛒
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Login Modal -->
  <div class="modal-overlay" id="loginOverlay" onclick="window._cloth.closeLoginModal()"></div>
  <div class="modal auth-modal" id="loginModal">
    <div class="modal-header">
      <h3>🔐 用户登录</h3>
      <button class="modal-close" onclick="window._cloth.closeLoginModal()">✕</button>
    </div>
    <form class="auth-form" id="loginForm" onsubmit="window._cloth.login(event)">
      <div class="form-group">
        <label for="loginUsername">用户名 <span class="required">*</span></label>
        <input type="text" id="loginUsername" placeholder="请输入用户名" maxlength="20">
        <span class="error-msg" id="errLoginUsername"></span>
      </div>
      <div class="form-group">
        <label for="loginPassword">密码 <span class="required">*</span></label>
        <input type="password" id="loginPassword" placeholder="请输入密码" maxlength="20">
        <span class="error-msg" id="errLoginPassword"></span>
      </div>
      <button type="submit" class="btn-submit">登录</button>
      <div class="auth-switch">
        还没有账号？<a href="#" onclick="window._cloth.switchToRegister()">立即注册</a>
      </div>
    </form>
  </div>

  <!-- Register Modal -->
  <div class="modal-overlay" id="registerOverlay" onclick="window._cloth.closeRegisterModal()"></div>
  <div class="modal auth-modal" id="registerModal">
    <div class="modal-header">
      <h3>📝 用户注册</h3>
      <button class="modal-close" onclick="window._cloth.closeRegisterModal()">✕</button>
    </div>
    <form class="auth-form" id="registerForm" onsubmit="window._cloth.register(event)">
      <div class="form-group">
        <label for="regUsername">用户名 <span class="required">*</span></label>
        <input type="text" id="regUsername" placeholder="请输入用户名（3-20个字符）" maxlength="20">
        <span class="error-msg" id="errRegUsername"></span>
      </div>
      <div class="form-group">
        <label for="regPassword">密码 <span class="required">*</span></label>
        <input type="password" id="regPassword" placeholder="请输入密码（6-20个字符）" maxlength="20">
        <span class="error-msg" id="errRegPassword"></span>
      </div>
      <div class="form-group">
        <label for="regConfirmPassword">确认密码 <span class="required">*</span></label>
        <input type="password" id="regConfirmPassword" placeholder="请再次输入密码" maxlength="20">
        <span class="error-msg" id="errRegConfirmPassword"></span>
      </div>
      <div class="form-group">
        <label for="regPhone">手机号 <span class="required">*</span></label>
        <input type="tel" id="regPhone" placeholder="请输入11位手机号" maxlength="11">
        <span class="error-msg" id="errRegPhone"></span>
      </div>
      <button type="submit" class="btn-submit">注册</button>
      <div class="auth-switch">
        已有账号？<a href="#" onclick="window._cloth.switchToLogin()">立即登录</a>
      </div>
    </form>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="container filter-inner">
      <button class="filter-btn active" data-cat="全部" onclick="window._cloth.filterBy('cat','全部')">全部</button>
      <button class="filter-btn" data-cat="男装" onclick="window._cloth.filterBy('cat','男装')">男装</button>
      <button class="filter-btn" data-cat="女装" onclick="window._cloth.filterBy('cat','女装')">女装</button>
      <button class="filter-btn" data-cat="童装" onclick="window._cloth.filterBy('cat','童装')">童装</button>
    </div>
  </div>

  <!-- Product Grid -->
  <main class="container">
    <div class="product-grid" id="productGrid"></div>
  </main>

  <!-- Bottom Cart Bar -->
  <div class="cart-bar" id="cartBar">
    <div class="container cart-bar-inner">
      <span class="cart-tip">已选 <strong id="cartCountBar">0</strong> 件</span>
      <span class="cart-total-label">合计：<strong id="cartTotalBar">¥0.00</strong></span>
      <button class="btn-settle" id="btnSettle" onclick="window._cloth.openCheckout()" disabled>去结算</button>
    </div>
  </div>

  <!-- Cart Drawer Overlay -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="window._cloth.toggleDrawer()"></div>

  <!-- Cart Drawer -->
  <aside class="cart-drawer" id="cartDrawer">
    <div class="drawer-header">
      <h3>🛒 购物车</h3>
      <button class="drawer-close" onclick="window._cloth.toggleDrawer()">✕</button>
    </div>
    <div class="drawer-items" id="drawerItems"></div>
    <div class="drawer-footer">
      <div class="drawer-total">
        <span>总计：</span>
        <span class="drawer-price" id="drawerTotal">¥0.00</span>
      </div>
      <div class="drawer-btns">
        <button class="btn-clear" onclick="window._cloth.clearCart()">清空</button>
        <button class="btn-checkout" id="btnCheckout" onclick="window._cloth.openCheckout()" disabled>去结算</button>
      </div>
    </div>
  </aside>

  <!-- Checkout Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="window._cloth.closeCheckout()"></div>
  <div class="modal checkout-modal" id="checkoutModal">
    <div class="modal-header">
      <h3>📋 填写订单信息</h3>
      <button class="modal-close" onclick="window._cloth.closeCheckout()">✕</button>
    </div>
    <form class="checkout-form" id="checkoutForm" onsubmit="window._cloth.submitOrder(event)">
      <div class="form-group">
        <label for="fName">姓名 <span class="required">*</span></label>
        <input type="text" id="fName" placeholder="请输入收货人姓名" maxlength="20">
        <span class="error-msg" id="errName"></span>
      </div>
      <div class="form-group">
        <label for="fPhone">手机号 <span class="required">*</span></label>
        <input type="tel" id="fPhone" placeholder="请输入11位手机号" maxlength="11">
        <span class="error-msg" id="errPhone"></span>
      </div>
      <div class="form-group">
        <label for="fAddress">收货地址 <span class="required">*</span></label>
        <textarea id="fAddress" placeholder="请输入详细收货地址" rows="2" maxlength="100"></textarea>
        <span class="error-msg" id="errAddress"></span>
      </div>
      <div class="form-summary">
        共 <strong id="summaryCount">0</strong> 件，合计 <strong id="summaryTotal">¥0.00</strong>
      </div>
      <button type="submit" class="btn-submit">确认提交订单</button>
    </form>
  </div>

  <!-- Success Modal -->
  <div class="modal-overlay" id="successOverlay"></div>
  <div class="modal success-modal" id="successModal">
    <div class="success-icon">🎉</div>
    <h3>下单成功！</h3>
    <p class="order-num" id="orderNum"></p>
    <div class="order-items" id="orderItems"></div>
    <p class="success-note">感谢您的惠顾，商品将尽快送达！</p>
    <button class="btn-submit" onclick="window._cloth.closeSuccess()">继续购物</button>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
