<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLOTHING STORE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container header-inner">
      <h1 class="logo">CLOTHING <span>STORE</span></h1>
      <nav class="site-nav">
        <a href="#" class="nav-link active" data-view="shop" onclick="window._cloth.switchView('shop')">商品</a>
        <a href="#" class="nav-link" data-view="showcase" onclick="window._cloth.switchView('showcase')">买家秀</a>
        <a href="#" class="nav-link" data-view="orders" onclick="window._cloth.switchView('orders')">订单</a>
      </nav>
      <div class="header-actions">
        <span class="points-badge" id="pointsBadge">⭐ <strong id="pointsCount">0</strong> 积分</span>
        <button class="cart-btn" onclick="window._cloth.toggleDrawer()">
          🛒
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="container filter-inner">
      <button class="filter-btn active" data-cat="全部" onclick="window._cloth.filterBy('cat','全部')">全部</button>
      <button class="filter-btn" data-cat="男装" onclick="window._cloth.filterBy('cat','男装')">男装</button>
      <button class="filter-btn" data-cat="女装" onclick="window._cloth.filterBy('cat','女装')">女装</button>
      <button class="filter-btn" data-cat="童装" onclick="window._cloth.filterBy('cat','童装')">童装</button>
      <div class="search-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索商品..." oninput="window._cloth.searchProducts(this.value)">
      </div>
    </div>
  </div>

  <!-- Product Grid -->
  <main class="container">
    <div class="product-grid" id="productGrid"></div>
  </main>

  <!-- Bottom Cart Bar -->
  <div class="cart-bar" id="cartBar">
    <div class="container cart-bar-inner">
      <span class="cart-tip">已选 <strong id="cartCountBar">0</strong> 件</span>
      <span class="cart-total-label">合计：<strong id="cartTotalBar">¥0.00</strong></span>
      <button class="btn-settle" id="btnSettle" onclick="window._cloth.openCheckout()" disabled>去结算</button>
    </div>
  </div>

  <!-- Cart Drawer Overlay -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="window._cloth.toggleDrawer()"></div>

  <!-- Cart Drawer -->
  <aside class="cart-drawer" id="cartDrawer">
    <div class="drawer-header">
      <h3>🛒 购物车</h3>
      <button class="drawer-close" onclick="window._cloth.toggleDrawer()">✕</button>
    </div>
    <div class="drawer-items" id="drawerItems"></div>
    <div class="drawer-footer">
      <div class="drawer-total">
        <span>总计：</span>
        <span class="drawer-price" id="drawerTotal">¥0.00</span>
      </div>
      <div class="drawer-btns">
        <button class="btn-clear" onclick="window._cloth.clearCart()">清空</button>
        <button class="btn-checkout" id="btnCheckout" onclick="window._cloth.openCheckout()" disabled>去结算</button>
      </div>
    </div>
  </aside>

  <!-- Checkout Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="window._cloth.closeCheckout()"></div>
  <div class="modal checkout-modal" id="checkoutModal">
    <div class="modal-header">
      <h3>📋 填写订单信息</h3>
      <button class="modal-close" onclick="window._cloth.closeCheckout()">✕</button>
    </div>
    <form class="checkout-form" id="checkoutForm" onsubmit="window._cloth.submitOrder(event)">
      <div class="form-group">
        <label for="fName">姓名 <span class="required">*</span></label>
        <input type="text" id="fName" placeholder="请输入收货人姓名" maxlength="20">
        <span class="error-msg" id="errName"></span>
      </div>
      <div class="form-group">
        <label for="fPhone">手机号 <span class="required">*</span></label>
        <input type="tel" id="fPhone" placeholder="请输入11位手机号" maxlength="11">
        <span class="error-msg" id="errPhone"></span>
      </div>
      <div class="form-group">
        <label for="fAddress">收货地址 <span class="required">*</span></label>
        <textarea id="fAddress" placeholder="请输入详细收货地址" rows="2" maxlength="100"></textarea>
        <span class="error-msg" id="errAddress"></span>
      </div>
      <div class="form-summary">
        共 <strong id="summaryCount">0</strong> 件，合计 <strong id="summaryTotal">¥0.00</strong>
      </div>
      <button type="submit" class="btn-submit">确认提交订单</button>
    </form>
  </div>

  <!-- Success Modal -->
  <div class="modal-overlay" id="successOverlay"></div>
  <div class="modal success-modal" id="successModal">
    <div class="success-icon">🎉</div>
    <h3>下单成功！</h3>
    <p class="order-num" id="orderNum"></p>
    <div class="order-items" id="orderItems"></div>
    <p class="success-note">感谢您的惠顾，商品将尽快送达！</p>
    <button class="btn-submit" onclick="window._cloth.closeSuccess()">继续购物</button>
  </div>

  <!-- Showcase Section -->
  <section class="showcase-section" id="showcaseSection" style="display:none;">
    <div class="container">
      <div class="showcase-header">
        <h2>👗 真实买家秀</h2>
        <div class="showcase-header-right">
          <span class="showcase-points">⭐ <strong id="showcasePoints">0</strong> 积分</span>
          <button class="btn-upload" onclick="window._cloth.openUpload()">+ 上传穿搭</button>
        </div>
      </div>
      <div class="showcase-grid" id="showcaseGrid"></div>
      <div class="showcase-empty" id="showcaseEmpty">
        <div class="showcase-empty-icon">📸</div>
        <p>还没有买家秀，快来上传你的穿搭吧！</p>
        <button class="btn-upload" onclick="window._cloth.openUpload()">+ 上传第一张穿搭</button>
      </div>
    </div>
  </section>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadOverlay" onclick="window._cloth.closeUpload()"></div>
  <div class="modal upload-modal" id="uploadModal">
    <div class="modal-header">
      <h3>📸 上传穿搭照</h3>
      <button class="modal-close" onclick="window._cloth.closeUpload()">✕</button>
    </div>
    <form class="upload-form" id="uploadForm" onsubmit="window._cloth.submitUpload(event)">
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="upload-placeholder" id="uploadPlaceholder">
          <span class="upload-icon">📷</span>
          <p>点击选择照片</p>
          <span class="upload-hint">支持 JPG / PNG，文件不超过 2MB</span>
        </div>
        <img id="uploadPreview" class="upload-preview" style="display:none;" alt="预览">
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
      </div>
      <div class="form-group">
        <label for="uploadDesc">穿搭描述 <span class="required">*</span></label>
        <textarea id="uploadDesc" placeholder="描述你的穿搭，如：这套搭配来自本店新款，非常适合通勤~" rows="3" maxlength="200"></textarea>
        <span class="error-msg" id="errUpload"></span>
      </div>
      <div class="upload-reward">
        <span>上传成功可获得 ⭐ <strong>10</strong> 积分奖励</span>
      </div>
      <button type="submit" class="btn-submit" id="btnSubmitUpload" disabled>提交</button>
    </form>
  </div>

  <!-- Comment Modal -->
  <div class="modal-overlay" id="commentsOverlay" onclick="window._cloth.closeComments()"></div>
  <div class="modal comment-modal" id="commentsModal">
    <div class="modal-header">
      <h3 id="commentsModalTitle">用户评论</h3>
      <button class="modal-close" onclick="window._cloth.closeComments()">✕</button>
    </div>
    <div class="comments-list" id="commentsList">
      <div class="comments-empty">还没有评论，快来发表第一条评论吧~</div>
    </div>
    <form class="comment-form" id="commentsForm" onsubmit="window._cloth.submitComment(event)">
      <div class="comment-form-row">
        <input type="text" id="commentNickname" class="comment-input" placeholder="你的昵称" maxlength="20">
      </div>
      <div class="comment-form-row">
        <textarea id="commentContent" class="comment-textarea" placeholder="说说你的看法..." rows="2" maxlength="200"></textarea>
      </div>
      <span class="error-msg" id="errComment"></span>
      <button type="submit" class="btn-comment-submit">发表评论</button>
    </form>
  </div>

  <!-- Orders Section -->
  <section class="orders-section" id="ordersSection" style="display:none;">
    <div class="container">
      <div class="orders-header">
        <h2>📦 我的订单</h2>
        <button class="btn-clear-orders" onclick="window._cloth.clearOrders()">清空记录</button>
      </div>
      <div class="orders-container" id="ordersContainer"></div>
      <div class="orders-empty" id="ordersEmpty">
        <div class="orders-empty-icon">📦</div>
        <p>还没有订单，快去选购商品吧！</p>
        <button class="btn-submit" onclick="window._cloth.switchView('shop')">去购物</button>
      </div>
    </div>
  </section>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/showcase.js"></script>
  <script src="js/comments.js"></script>
  <script src="js/orders.js"></script>
</body>
</html>
